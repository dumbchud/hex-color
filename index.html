<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Color DB</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@jaames/iro@5"></script>
    
    <style>
        * { box-sizing: border-box; }
        :root { --bg: #0f1115; --card: #1c1f26; --text: #f8f8f2; --primary: #6366f1; --primary-hover: #4f46e5; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 480px; }
        
        h1 { text-align: center; font-weight: 600; letter-spacing: -0.5px; margin-bottom: 30px; }

        input[type="password"] { width: 100%; padding: 14px; border-radius: 10px; border: 1px solid #333; background: #15171c; color: white; font-size: 16px; font-family: 'Inter', sans-serif;}
        button { padding: 14px; border: none; border-radius: 10px; background: var(--primary); color: white; font-weight: 600; font-size: 16px; cursor: pointer; transition: 0.2s; font-family: 'Inter', sans-serif;}
        button:hover { background: var(--primary-hover); }

        #login-screen { display: flex; flex-direction: column; gap: 15px; margin-top: 50px; }
        #app-screen { display: none; flex-direction: column; gap: 20px; }
        .picker-card { background: var(--card); padding: 25px; border-radius: 16px; display: flex; flex-direction: column; align-items: center; gap: 20px; box-shadow: 0 8px 16px rgba(0,0,0,0.4); border: 1px solid #2a2e37;}
        
        .color-tabs { display: flex; width: 100%; gap: 10px; }
        .color-tab { flex: 1; background: #15171c; border: 2px solid #333; padding: 12px; border-radius: 12px; text-align: center; cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; gap: 8px;}
        .color-tab.active { border-color: var(--primary); background: rgba(99, 102, 241, 0.08); }
        .tab-label { font-size: 12px; font-weight: 600; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px;}
        .color-tab.active .tab-label { color: var(--primary); }
        .tab-swatch { width: 100%; height: 30px; border-radius: 6px; box-shadow: inset 0 0 0 1px rgba(255,255,255,0.1); }
        .tab-input { width: 100%; background: transparent; border: none; color: white; font-size: 14px; font-family: monospace; outline: none; text-align: center; text-transform: uppercase; padding: 0;}

        .slider-group { width: 100%; display: flex; flex-direction: column; gap: 10px; background: #15171c; padding: 15px; border-radius: 10px; border: 1px solid #333; }
        .slider-header { display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
        .unit-btn { background: #2a2e37; color: white; border: none; padding: 6px 10px; border-radius: 6px; font-size: 12px; cursor: pointer;}
        
        .dim-row { display: flex; gap: 10px; width: 100%; }
        .dim-input-wrapper { flex: 1; display: flex; align-items: center; background: #0f1115; border: 1px solid #333; border-radius: 8px; overflow: hidden; padding-right: 12px;}
        .dim-input-wrapper input { background: transparent; border: none; color: white; padding: 12px; width: 100%; font-size: 15px; outline: none; font-family: 'Inter';}
        .dim-input-wrapper span { color: #666; font-weight: bold; font-size: 12px;}
        
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        .props-container { width: 100%; display: flex; flex-direction: column; gap: 10px; }
        .active-props { display: flex; flex-direction: column; gap: 8px; }
        .prop-row { display: flex; justify-content: space-between; align-items: center; background: #15171c; padding: 10px 15px; border-radius: 10px; border: 1px solid #333; gap: 10px;}
        .prop-row label { font-size: 14px; color: #aaa; flex: 1; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
        .prop-input-text { flex: 1.5; background: transparent; border: none; border-bottom: 1px solid #444; color: white; font-size: 14px; outline: none; font-family: 'Inter'; padding: 4px; min-width: 0;}
        .prop-input-check { width: 22px; height: 22px; accent-color: var(--primary); cursor: pointer; flex-shrink: 0;}
        .prop-slider-wrapper { flex: 1.5; display: flex; align-items: center; gap: 10px; min-width: 0;}
        .prop-slider-val { font-size: 14px; font-weight: 600; width: 20px; text-align: right; flex-shrink: 0;}
        .prop-remove { background: transparent; color: #ef4444; border: none; font-weight: bold; cursor: pointer; padding: 4px 8px; flex-shrink: 0;}
        
        .add-prop-btn { background: #15171c; border: 1px dashed #444; color: #aaa; width: 100%; padding: 10px; border-radius: 10px; font-size: 14px; cursor: pointer; font-family: 'Inter'; transition: 0.2s;}
        .add-prop-btn:hover { border-color: var(--primary); color: white; }
        
        .prop-menu { display: none; flex-direction: column; gap: 12px; background: #2a2e37; padding: 15px; border-radius: 10px; margin-top: 5px; width: 100%;}
        
        .freq-list { display: flex; flex-wrap: wrap; gap: 8px; }
        .freq-chip { display: inline-flex; align-items: center; background: #15171c; border: 1px solid #444; border-radius: 20px; font-size: 12px; color: #ddd; overflow: hidden;}
        .freq-chip-add { padding: 6px 10px; cursor: pointer; }
        .freq-chip-add:hover { background: rgba(99, 102, 241, 0.1); color: white; }
        .freq-chip-del { padding: 6px 8px; border-left: 1px solid #444; cursor: pointer; color: #ef4444; font-weight: bold; }
        .freq-chip-del:hover { background: rgba(239, 68, 68, 0.1); }
        
        .new-prop-row { display: flex; gap: 8px; width: 100%; align-items: center;}
        .new-prop-row input, .new-prop-row select { background: #15171c; border: 1px solid #444; color: white; padding: 8px; border-radius: 6px; font-size: 13px; outline: none; }
        .new-prop-row input { flex: 1; min-width: 0; }
        .new-prop-row select { flex-shrink: 1; min-width: 0; } 
        .new-prop-row button { padding: 8px 12px; font-size: 13px; flex-shrink: 0; }

        .name-group { width: 100%; display: flex; flex-direction: column; gap: 12px; }
        .name-input { background: #15171c; padding: 14px; border-radius: 10px; border: 1px solid #333; color: white; font-size: 16px; width: 100%;}
        .save-btn { width: 100%; }

        .color-list { display: flex; flex-direction: column; gap: 15px; margin-top: 10px; }
        .color-item { background: var(--card); border-radius: 12px; border: 1px solid #2a2e37; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 4px 6px rgba(0,0,0,0.2);}
        .full-bar { width: 100%; height: 60px; cursor: pointer; border-bottom: 1px solid #2a2e37;}
        .item-footer { padding: 16px; display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
        .details { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 0;}
        .details h3 { margin: 0; font-size: 16px; font-weight: 600; line-height: 1.2; word-wrap: break-word;}
        .details p { margin: 0; font-size: 12px; color: #8b949e; font-family: monospace; }
        
        .tags-container { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
        .tag { background: #15171c; border: 1px solid #333; padding: 4px 8px; border-radius: 6px; font-size: 11px; color: #ccc; font-weight: 600; letter-spacing: 0.5px; }
        .tag.check-true { color: #10b981; border-color: rgba(16, 185, 129, 0.3); background: rgba(16, 185, 129, 0.05); }
        .tag.check-false { color: #ef4444; border-color: rgba(239, 68, 68, 0.3); background: rgba(239, 68, 68, 0.05); text-decoration: line-through;}

        .delete-btn { background: rgba(239, 68, 68, 0.1); color: #ef4444; padding: 8px 12px; border-radius: 8px; font-weight: bold; flex-shrink: 0;}
        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #fff; color: #000; padding: 12px 24px; border-radius: 30px; font-weight: 600; font-size: 14px; opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 100;}
        .show-toast { opacity: 1 !important; }
    </style>
</head>
<body>
    <div class="container">
        <h1>THE database 💔</h1>
        
        <div id="login-screen">
            <input type="password" id="password" placeholder="Enter Password">
            <button onclick="login()">Login</button>
        </div>

        <div id="app-screen">
            <div class="picker-card">
                
                <div class="color-tabs">
                    <div class="color-tab active" id="tab-0" onclick="switchTab(0)">
                        <span class="tab-label">Base Color</span>
                        <div class="tab-swatch" id="swatch-0" style="background: #6366f1;"></div>
                        <input type="text" class="tab-input" id="input-0" value="#6366F1" maxlength="7" onclick="event.stopPropagation()">
                    </div>
                    <div class="color-tab" id="tab-1" onclick="switchTab(1)">
                        <span class="tab-label">Tip Color</span>
                        <div class="tab-swatch" id="swatch-1" style="background: #ec4899;"></div>
                        <input type="text" class="tab-input" id="input-1" value="#EC4899" maxlength="7" onclick="event.stopPropagation()">
                    </div>
                </div>

                <div id="color-wheel"></div>

                <div class="slider-group">
                    <div class="slider-header">
                        <span style="color:#aaa;">Dimensions (<span id="unitDisplay">cm</span>)</span>
                        <button class="unit-btn" id="unitToggle" onclick="toggleUnit()">Swap to Inches</button>
                    </div>
                    <div class="dim-row">
                        <div class="dim-input-wrapper">
                            <input type="number" id="lengthInput" placeholder="Length (Ø)" step="0.1">
                            <span class="unit-label">cm</span>
                        </div>
                        <div class="dim-input-wrapper">
                            <input type="number" id="girthInput" placeholder="Girth (Ø)" step="0.1">
                            <span class="unit-label">cm</span>
                        </div>
                    </div>
                </div>

                <div class="props-container">
                    <div class="active-props" id="active-props-list"></div>
                    <button class="add-prop-btn" onclick="togglePropMenu()">+ Add Custom Property</button>
                    
                    <div class="prop-menu" id="prop-menu">
                        <span style="font-size: 12px; color: #888; font-weight: bold; text-transform: uppercase;">Often Used (Cloud Synced)</span>
                        <div class="freq-list" id="freq-list"><span style="font-size:12px; color:#666;">Loading...</span></div>
                        
                        <span style="font-size: 12px; color: #888; font-weight: bold; text-transform: uppercase; margin-top: 10px;">Create New</span>
                        <div class="new-prop-row">
                            <input type="text" id="newPropName" placeholder="E.g. Firmness">
                            <select id="newPropType">
                                <option value="text">Text</option>
                                <option value="slider">Slider (1-10)</option>
                                <option value="check">Checkmark</option>
                            </select>
                            <button onclick="createNewProp()">Add</button>
                        </div>
                    </div>
                </div>

                <div class="name-group">
                    <input type="text" id="colorName" class="name-input" placeholder="Give this entry a name...">
                    <button class="save-btn" onclick="saveColor()">Save Entry</button>
                </div>
            </div>
            
            <button onclick="logout()" style="background:transparent; border: 1px solid #333; color: #888; padding: 12px; width: 100%; border-radius: 10px;">Logout</button>
            <div class="color-list" id="colorList"></div>
        </div>
    </div>
    
    <div id="toast">Copied!</div>

    <script>
        // --- SELF HEALING URL LOGIC ---
        let WORKER_URL = "https://color-api.luku-di456.workers.dev";
        
        // This automatically fixes typos, trailing slashes, or missing https!
        WORKER_URL = WORKER_URL.trim().replace(/\/+$/, '');
        if (!WORKER_URL.startsWith('http')) WORKER_URL = 'https://' + WORKER_URL;
        if (WORKER_URL.includes('https//')) WORKER_URL = WORKER_URL.replace('https//', 'https://');
        // ------------------------------

        let colorPicker; 
        let useInches = false;
        let activeColors = ["#6366f1", "#ec4899"];
        let activeTab = 0;
        let currentProps = []; 
        let freqProps = []; 

        window.onload = () => {
            initColorPicker();
            if(localStorage.getItem('db_password')) {
                loadCloudData();
            }
        };

        async function loadCloudData() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-screen').style.display = 'flex';
            
            loadFreqProps();
            loadColors();
        }

        async function loadFreqProps() {
            try {
                const res = await fetch(WORKER_URL + '/api/props', { headers: getAuthHeaders() });
                if (res.ok) {
                    freqProps = await res.json();
                    renderFreqProps();
                }
            } catch(e) { console.error("Properties failed to load", e); }
        }

        async function deleteFreqProp(name) {
            if(!confirm(`Delete '${name}' from Often Used?`)) return;
            freqProps = freqProps.filter(p => p.name !== name);
            renderFreqProps();
            await fetch(WORKER_URL + '/api/props', { method: 'DELETE', headers: getAuthHeaders(), body: JSON.stringify({ name }) });
        }

        async function createNewProp() {
            const name = document.getElementById('newPropName').value.trim();
            const type = document.getElementById('newPropType').value;
            if (!name) return;
            
            addPropToForm(name, type);
            document.getElementById('newPropName').value = '';

            if (!freqProps.find(p => p.name.toLowerCase() === name.toLowerCase())) {
                freqProps.push({ name, type });
                renderFreqProps();
                await fetch(WORKER_URL + '/api/props', { method: 'POST', headers: getAuthHeaders(), body: JSON.stringify({ name, type }) });
            }
        }

        function togglePropMenu() {
            const menu = document.getElementById('prop-menu');
            menu.style.display = menu.style.display === 'flex' ? 'none' : 'flex';
        }

        function renderFreqProps() {
            const list = document.getElementById('freq-list');
            list.innerHTML = '';
            if(freqProps.length === 0) { list.innerHTML = '<span style="font-size:12px; color:#666; font-style:italic;">No saved variables yet.</span>'; return; }

            freqProps.forEach((p) => {
                list.innerHTML += `<div class="freq-chip"><div class="freq-chip-add" onclick="addPropToForm('${p.name}', '${p.type}')">+ ${p.name}</div><div class="freq-chip-del" onclick="deleteFreqProp('${p.name}')">✕</div></div>`;
            });
        }

        function addPropToForm(name, type) {
            if (currentProps.find(p => p.name === name)) return; 
            let defaultVal = type === 'text' ? '' : (type === 'slider' ? 5 : false);
            currentProps.push({ name, type, value: defaultVal });
            document.getElementById('prop-menu').style.display = 'none';
            renderActiveProps();
        }

        function removeProp(index) {
            currentProps.splice(index, 1);
            renderActiveProps();
        }

        function updatePropVal(index, val) {
            currentProps[index].value = val;
            if (currentProps[index].type === 'slider') document.getElementById(`prop-val-${index}`).innerText = val;
        }

        function renderActiveProps() {
            const container = document.getElementById('active-props-list');
            container.innerHTML = '';
            currentProps.forEach((p, i) => {
                let inputHtml = '';
                if (p.type === 'text') inputHtml = `<input type="text" class="prop-input-text" placeholder="..." value="${p.value}" oninput="updatePropVal(${i}, this.value)">`;
                else if (p.type === 'slider') inputHtml = `<div class="prop-slider-wrapper"><input type="range" min="1" max="10" value="${p.value}" oninput="updatePropVal(${i}, this.value)"><span class="prop-slider-val" id="prop-val-${i}">${p.value}</span></div>`;
                else if (p.type === 'check') inputHtml = `<input type="checkbox" class="prop-input-check" ${p.value ? 'checked' : ''} onchange="updatePropVal(${i}, this.checked)">`;

                container.innerHTML += `<div class="prop-row"><label title="${p.name}">${p.name}</label>${inputHtml}<button class="prop-remove" onclick="removeProp(${i})">✕</button></div>`;
            });
        }

        function initColorPicker() {
            colorPicker = new iro.ColorPicker("#color-wheel", { width: 250, color: activeColors[0], borderWidth: 2, borderColor: "#333", layout: [{ component: iro.ui.Wheel }, { component: iro.ui.Slider, options: { sliderType: 'value' } }] });
            colorPicker.on('color:change', function(color) {
                activeColors[activeTab] = color.hexString;
                document.getElementById('swatch-' + activeTab).style.backgroundColor = color.hexString;
                document.getElementById('input-' + activeTab).value = color.hexString.toUpperCase();
            });

            [0, 1].forEach(i => {
                const input = document.getElementById('input-' + i);
                input.addEventListener('input', function() {
                    let val = this.value;
                    if (!val.startsWith('#')) val = '#' + val;
                    if (val.length === 4 || val.length === 7) {
                        try { activeColors[i] = val; document.getElementById('swatch-' + i).style.backgroundColor = val; if (activeTab === i) colorPicker.color.hexString = val; } catch (e) {}
                    }
                });
                input.addEventListener('focus', () => switchTab(i));
            });
        }

        function switchTab(index) {
            activeTab = index;
            document.getElementById('tab-0').classList.remove('active');
            document.getElementById('tab-1').classList.remove('active');
            document.getElementById('tab-' + index).classList.add('active');
            try { colorPicker.color.hexString = activeColors[index]; } catch (e) {}
        }

        function toggleUnit() {
            useInches = !useInches;
            document.getElementById('unitToggle').innerText = useInches ? "Swap to cm" : "Swap to Inches";
            document.querySelectorAll('.unit-label').forEach(l => l.innerText = useInches ? 'in' : 'cm');
            document.getElementById('unitDisplay').innerText = useInches ? 'in' : 'cm';
            
            const lenInput = document.getElementById('lengthInput');
            const grtInput = document.getElementById('girthInput');
            if(lenInput.value) lenInput.value = useInches ? (lenInput.value / 2.54).toFixed(2) : (lenInput.value * 2.54).toFixed(2);
            if(grtInput.value) grtInput.value = useInches ? (grtInput.value / 2.54).toFixed(2) : (grtInput.value * 2.54).toFixed(2);
        }

        function getAuthHeaders() { return { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + localStorage.getItem('db_password') }; }
        function showToast(msg) { const t = document.getElementById('toast'); t.innerText = msg; t.classList.add('show-toast'); setTimeout(() => t.classList.remove('show-toast'), 2000); }

        async function login() {
            const password = document.getElementById('password').value.toLowerCase();
            try {
                const res = await fetch(WORKER_URL + '/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ password }) });
                if (res.ok) { 
                    localStorage.setItem('db_password', password); 
                    loadCloudData(); 
                } else { 
                    alert('Wrong password!'); 
                }
            } catch (e) { 
                // DETAILED CRASH REPORT
                alert('CRASH REPORT:\n\n' + e.message + '\n\nURL: ' + WORKER_URL + '\n\nMake sure your WiFi/Adblocker is not blocking workers.dev!'); 
            }
        }

        function logout() {
            localStorage.removeItem('db_password');
            document.getElementById('login-screen').style.display = 'flex';
            document.getElementById('app-screen').style.display = 'none';
        }

        async function loadColors() {
            try {
                const res = await fetch(WORKER_URL + '/api/colors', { headers: getAuthHeaders() });
                if (res.status === 401) return logout();
                const colors = await res.json();
                renderColors(colors);
            } catch(e) { console.error(e); }
        }

        async function saveColor() {
            const hex1 = activeColors[0], hex2 = activeColors[1]; 
            const length = document.getElementById('lengthInput').value, girth = document.getElementById('girthInput').value;
            const unit = useInches ? 'in' : 'cm';
            const name = document.getElementById('colorName').value || 'Unnamed Entry';
            
            const res = await fetch(WORKER_URL + '/api/colors', { method: 'POST', headers: getAuthHeaders(), body: JSON.stringify({ name, hex1, hex2, length, girth, unit, customFields: currentProps }) });
            if (res.ok) {
                document.getElementById('colorName').value = ''; 
                document.getElementById('lengthInput').value = '';
                document.getElementById('girthInput').value = '';
                currentProps = []; 
                renderActiveProps();
                showToast("Saved!");
                loadColors();
            }
        }

        async function deleteColor(id) {
            if(!confirm('Delete this entry?')) return;
            await fetch(WORKER_URL + '/api/colors', { method: 'DELETE', headers: getAuthHeaders(), body: JSON.stringify({ id }) });
            loadColors();
        }

        function copyData(hex1, hex2) {
            navigator.clipboard.writeText(`Base: ${hex1} | Tip: ${hex2}`);
            showToast('Copied Colors!');
        }

        function renderColors(colors) {
            const list = document.getElementById('colorList');
            list.innerHTML = '';
            colors.forEach(c => {
                const h1 = c.hex1 || c.hex || '#000000', h2 = c.hex2 || c.hex || '#ffffff';
                const u = c.unit || 'cm', len = c.length || c.lengthCm, grt = c.girth;
                const lStr = len ? `${len} ${u}` : 'Ø', gStr = grt ? `${grt} ${u}` : 'Ø';
                const gradient = `linear-gradient(to right, ${h1} 50%, ${h2} 50%)`;

                let tagsHtml = '';
                if (c.customFields && c.customFields.length > 0) {
                    tagsHtml = '<div class="tags-container">';
                    c.customFields.forEach(f => {
                        if (f.type === 'check') tagsHtml += `<span class="tag ${f.value ? 'check-true' : 'check-false'}">${f.name}</span>`;
                        else tagsHtml += `<span class="tag">${f.name}: <span style="color:#fff">${f.value}</span></span>`;
                    });
                    tagsHtml += '</div>';
                }

                list.innerHTML += `<div class="color-item"><div class="full-bar" style="background: ${gradient};" onclick="copyData('${h1}', '${h2}')"></div><div class="item-footer"><div class="details"><h3>${c.name}</h3><p style="font-family: 'Inter'; color: #aaa;">Base: <span style="color:${h1}; font-family: monospace;">${h1}</span> &nbsp;&bull;&nbsp; Tip: <span style="color:${h2}; font-family: monospace;">${h2}</span></p><p style="font-family: 'Inter'; color: #aaa;">Len: <span style="color:#fff;">${lStr}</span> &nbsp;&bull;&nbsp; Girth: <span style="color:#fff;">${gStr}</span></p>${tagsHtml}</div><button class="delete-btn" onclick="deleteColor('${c.id}')">✕</button></div></div>`;
            });
        }
    </script>
</body>
</html>
